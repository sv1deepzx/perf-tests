networks:
  perf-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

services:
  app-mvc:
    build: ./app-mvc
    environment:
      - SPRING_THREADS_VIRTUAL_ENABLED=false
    ports:
      - "8080:8080"
    networks:
      - perf-net
    depends_on:
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  app-mvc-vt:
    build: ./app-mvc
    environment:
      - SPRING_THREADS_VIRTUAL_ENABLED=true
      - DOWNSTREAM_CONCURRENCY_LIMIT=500
    ports:
      - "8081:8080"
    networks:
      - perf-net
    depends_on:
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  app-webflux:
    build: ./app-webflux
    ports:
      - "8082:8080"
    networks:
      - perf-net
    depends_on:
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  wiremock:
    image: wiremock/wiremock:3.3.1
    command: ["--container-threads=2000"]
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
    networks:
      - perf-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1d'
    networks:
      - perf-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - perf-net
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8083:8080"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - perf-net

  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6/scripts:/scripts:ro
      - ./k6/results:/results
    networks:
      - perf-net
    profiles:
      - k6
